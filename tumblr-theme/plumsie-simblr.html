  <!-- ═══════════════════════════════════════════════════
       DARK MODE INITIALIZATION SCRIPT
       ═══════════════════════════════════════════════════ -->
  <script>
    // Check for saved theme preference or use prefers-color-scheme
    const savedTheme = localStorage.getItem('theme');
    const prefersDark = window.matchMedia('(prefers-color-scheme: dark)').matches;
    const isDarkMode = savedTheme === 'dark' || (savedTheme !== 'light' && prefersDark);

    // Apply dark mode class if needed
    if (isDarkMode) {
      document.documentElement.classList.add('dark');
    }

    // Function to toggle theme
    function toggleTheme() {
      const isDark = document.documentElement.classList.toggle('dark');
      localStorage.setItem('theme', isDark ? 'dark' : 'light');
    }
  </script>

  <!-- ═══════════════════════════════════════════════════
       STYLES
       ═══════════════════════════════════════════════════ -->
  <style>

    /* ─── DESIGN TOKENS ──────────────────────────────── */
    :root {
      --bg:            {color:Background};
      --text:          {color:Text};
      --accent:        {color:Accent};
      --highlight:     {color:Highlight};
      --header-bg:     {color:Header Background};
      --sidebar-bg:    {color:Sidebar Background};
      --border:        {color:Border};
      --post-bg:       {color:Post Background};

      /* Derived palette (static, referenced from brand) */
      --sand-50:   #fdf8f0;
      --sand-100:  #f9edd8;
      --sand-200:  #f2d9b0;
      --sand-300:  #e8c080;
      --sand-400:  #dca050;
      --sand-500:  #c8842a;
      --sand-600:  #a86820;
      --sand-700:  #865018;
      --sand-800:  #663c14;
      --sand-900:  #4a2c10;
      --sand-950:  #2e1a08;
      --ember-400: #e07040;
      --ember-500: #c05830;
      --ember-600: #9e4020;

      --font-display: 'Cormorant Garamond', Georgia, serif;
      --font-body:    'Karla', system-ui, sans-serif;

      --radius:     0.625rem;
      --radius-sm:  0.375rem;
      --radius-lg:  0.875rem;
      --radius-xl:  1.125rem;

      --shadow-sm: 0 1px 3px rgba(74,44,16,.06), 0 1px 2px rgba(74,44,16,.04);
      --shadow-md: 0 4px 12px rgba(74,44,16,.10), 0 2px 4px rgba(74,44,16,.06);
      --shadow-lg: 0 12px 32px rgba(74,44,16,.14), 0 4px 8px rgba(74,44,16,.08);

      --heading:       {color:Heading};
      --link:          {color:Link};
      --drop-cap:      {color:Drop Cap};

      --sidebar-width: {text:Sidebar Width};
      --content-max:   {text:Post Width};
      --site-max:      {text:Site Width};

      --transition: 300ms ease;
    }

    /* Dark mode styles */
    html.dark {
      --bg:         #2e1a08;
      --text:       #f9edd8;
      --accent:     #dca050;
      --highlight:  #e07040;
      --header-bg:  #1a0e04;
      --sidebar-bg: #3d2410;
      --border:     #663c14;
      --post-bg:    #4a2c10;
      --heading:    #f9edd8;
      --link:       #dca050;
      --drop-cap:   #dca050;
    }

    /* Navigation Hub Styles */
    .nav-hub {
      background: var(--post-bg);
      border: 1px solid var(--border);
      border-radius: var(--radius-lg);
      padding: 1.5rem;
      margin-bottom: 1.75rem;
    }

    .nav-hub-title {
      font-family: var(--font-display);
      font-size: 1.5rem;
      font-weight: 600;
      color: var(--heading);
      margin-bottom: 1rem;
    }

    .nav-hub-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(250px, 1fr));
      gap: 1rem;
    }

    .nav-hub-card {
      background: var(--sand-50);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 1rem;
      transition: transform 0.2s ease, box-shadow 0.2s ease;
    }
    .nav-hub-card:hover {
      transform: translateY(-4px);
      box-shadow: var(--shadow-md);
    }

    .nav-hub-card h3 {
      font-family: var(--font-display);
      font-size: 1.1rem;
      font-weight: 600;
      margin-bottom: 0.5rem;
    }

    .nav-hub-card p {
      font-size: 0.9rem;
      color: var(--text);
      margin-bottom: 1rem;
    }

    .nav-hub-card a {
      display: inline-block;
      font-family: var(--font-body);
      font-size: 0.875rem;
      font-weight: 500;
      color: var(--accent);
      text-decoration: none;
      margin-top: 0.5rem;
    }
    .nav-hub-card a:hover {
      text-decoration: underline;
    }

    /* Hub type accents */
    .hub-stories {
      --hub-accent: var(--ember-400);
    }
    .hub-cc {
      --hub-accent: #4a8c74;
    }
    .hub-recs {
      --hub-accent: #6a5acd;
    }
    .hub-rules {
      --hub-accent: var(--sand-600);
    }

    .nav-hub-card.hub-stories {
      border-top: 4px solid var(--hub-accent);
    }
    .nav-hub-card.hub-cc {
      border-top: 4px solid var(--hub-accent);
    }
    .nav-hub-card.hub-recs {
      border-top: 4px solid var(--hub-accent);
    }
    .nav-hub-card.hub-rules {
      border-top: 4px solid var(--hub-accent);
    }

    .nav-hub-card.hub-stories h3,
    .nav-hub-card.hub-cc h3,
    .nav-hub-card.hub-recs h3,
    .nav-hub-card.hub-rules h3 {
      color: var(--hub-accent);
    }

    .nav-hub-card.hub-stories a,
    .nav-hub-card.hub-cc a,
    .nav-hub-card.hub-recs a,
    .nav-hub-card.hub-rules a {
      color: var(--hub-accent);
    }

    /* Responsive adjustments */
    @media (max-width: 600px) {
      .nav-hub-grid {
        grid-template-columns: 1fr;
      }
    }

    /* Documentation comment */
    /*
      NAVIGATION HUB POST ELEMENTS

      To use these in a text post, add the appropriate class to a div:

      - .nav-hub: Wrapper for the entire navigation hub
      - .nav-hub-title: Section heading
      - .nav-hub-grid: Grid container for nav cards
      - .nav-hub-card: Individual card with title, description, and link

      Hub types (add to .nav-hub-card):
      - .hub-stories: Amber accent
      - .hub-cc: Teal accent
      - .hub-recs: Purple accent
      - .hub-rules: Neutral accent

      Example:
      <div class="nav-hub">
        <h2 class="nav-hub-title">Navigation Hub</h2>
        <div class="nav-hub-grid">
          <div class="nav-hub-card hub-stories">
            <h3>Stories</h3>
            <p>Read all the stories on this blog</p>
            <a href="/tagged/stories">View Stories →</a>
          </div>
          <div class="nav-hub-card hub-cc">
            <h3>Creative Corner</h3>
            <p>Explore creative writing and art</p>
            <a href="/tagged/creative">View Creative Corner →</a>
          </div>
        </div>
      </div>
    */

    /* NPF Post Support */
    .npf-image {
      width: 100%;
      border-radius: var(--radius);
      margin-bottom: 1rem;
    }

    .npf-text {
      font-family: var(--font-body);
      font-size: 1.125rem;
      line-height: 1.9;
      color: var(--text);
      margin-bottom: 1.5rem;
    }

    .npf-heading1 {
      font-family: var(--font-display);
      font-size: 1.5rem;
      font-weight: 600;
      color: var(--heading);
      margin-bottom: 1rem;
    }

    .npf-heading2 {
      font-family: var(--font-display);
      font-size: 1.25rem;
      font-weight: 600;
      color: var(--heading);
      margin-bottom: 0.75rem;
    }

    .npf-quote {
      border-left: 3px solid var(--sand-300);
      padding: 0.5rem 0 0.5rem 1rem;
      margin: 1em 0;
      color: var(--sand-600);
      font-style: italic;
    }

    .npf-link {
      display: flex;
      align-items: center;
      gap: 1rem;
      background: var(--sand-50);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 1rem 1.25rem;
      margin-bottom: 1rem;
      text-decoration: none;
    }

    .npf-audio {
      background: var(--sand-50);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 1rem;
      margin-bottom: 1rem;
    }

    .npf-video {
      position: relative;
      aspect-ratio: 16 / 9;
      background: #000;
      border-radius: var(--radius);
      overflow: hidden;
      margin-bottom: 1rem;
    }

    .npf-video iframe,
    .npf-video video {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      border: none;
    }

    /* Tabler Icons */
    .ti {
      font-size: 1rem;
      vertical-align: middle;
    }

    .sidebar-nav a svg,
    .social-link svg {
      display: none;
    }

    .sidebar-nav a i,
    .social-link i {
      margin-right: 0.5rem;
      width: 1rem;
      height: 1rem;
    }

    /* ─── HERO BACKGROUND IMAGE ─────────────────────── */
    {block:ifHeroBackground}
    #blog-hero {
      background-image: url('{image:Hero Background}');
      background-size: cover;
      background-position: center;
      background-blend-mode: multiply;
    }
    {/block:ifHeroBackground}

    /* ─── RESET & BASE ───────────────────────────────── */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    html {
      scroll-behavior: smooth;
      font-size: 16px;
    }

    body {
      background-color: var(--bg);
      color: var(--text);
      font-family: var(--font-body);
      font-size: 1rem;
      line-height: 1.7;
      min-height: 100vh;
      -webkit-font-smoothing: antialiased;
      transition: background-color var(--transition), color var(--transition);
    }

    img { max-width: 100%; height: auto; display: block; }
    a   { color: var(--link); text-decoration: none; transition: color var(--transition); }
    a:hover { color: var(--highlight); }
    a:focus-visible {
      outline: 2px solid var(--accent);
      outline-offset: 2px;
      border-radius: 2px;
    }

    /* ─── SCROLLBAR ──────────────────────────────────── */
    ::-webkit-scrollbar              { width: 6px; height: 6px; }
    ::-webkit-scrollbar-track        { background: var(--border); }
    ::-webkit-scrollbar-thumb        { background: var(--accent); border-radius: 3px; }
    ::-webkit-scrollbar-thumb:hover  { background: var(--highlight); }

    ::selection {
      background: var(--accent);
      color: var(--sand-50);
    }

    /* ─── READING PROGRESS BAR ───────────────────────── */
    {block:ifShowReadingProgressBar}
    #progress-bar {
      position: fixed;
      top: 0;
      left: 0;
      width: 0%;
      height: 2px;
      background: linear-gradient(90deg, var(--accent), var(--highlight));
      z-index: 9999;
      transition: width .1s linear;
    }
    {/block:ifShowReadingProgressBar}

    /* ─── SKIP LINK ──────────────────────────────────── */
    .skip-link {
      position: absolute;
      top: -3rem;
      left: 1rem;
      padding: .5rem 1rem;
      background: var(--header-bg);
      color: var(--sand-50);
      font-family: var(--font-body);
      font-size: .875rem;
      border-radius: 0 0 var(--radius) var(--radius);
      z-index: 10000;
      transition: top var(--transition);
    }
    .skip-link:focus { top: 0; }

    /* ═══════════════════════════════════════════════════
       HEADER
       ═══════════════════════════════════════════════════ */
    #site-header {
      position: sticky;
      top: 0;
      z-index: 200;
      background: color-mix(in srgb, var(--header-bg) 94%, transparent);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      border-bottom: 1px solid color-mix(in srgb, var(--border) 40%, transparent);
      transition: box-shadow var(--transition);
    }
    #site-header.scrolled {
      box-shadow: 0 4px 24px rgba(0,0,0,.2);
    }

    .header-inner {
      max-width: var(--site-max);
      margin: 0 auto;
      padding: 0 1.5rem;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 1.5rem;
      height: 4rem;
    }

    /* Wordmark */
    .site-wordmark {
      display: flex;
      align-items: baseline;
      gap: .35rem;
      text-decoration: none;
      flex-shrink: 0;
    }
    .site-wordmark .name-primary {
      font-family: var(--font-display);
      font-size: 1.5rem;
      font-weight: 600;
      color: var(--sand-100);
      letter-spacing: -.02em;
      line-height: 1;
    }
    .site-wordmark .name-secondary {
      font-family: var(--font-display);
      font-size: 1rem;
      font-style: italic;
      color: var(--sand-400);
      line-height: 1;
    }
    .site-wordmark:hover .name-primary  { color: var(--sand-50); }
    .site-wordmark:hover .name-secondary { color: var(--ember-400); }
    .site-wordmark:focus-visible { outline-color: var(--sand-400); }

    /* Primary nav */
    #primary-nav {
      display: flex;
      align-items: center;
      gap: .25rem;
      list-style: none;
    }
    #primary-nav a {
      font-family: var(--font-body);
      font-size: .8125rem;
      font-weight: 500;
      letter-spacing: .04em;
      text-transform: uppercase;
      color: var(--sand-300);
      padding: .375rem .625rem;
      border-radius: var(--radius-sm);
      transition: color var(--transition), background-color var(--transition);
    }
    #primary-nav a:hover {
      color: var(--sand-50);
      background-color: rgba(255,255,255,.08);
    }
    #primary-nav a:focus-visible {
      outline: 2px solid var(--sand-400);
      outline-offset: 1px;
    }

    /* Mobile hamburger */
    #nav-toggle {
      display: block;
      background: none;
      border: 1px solid rgba(255,255,255,.2);
      border-radius: var(--radius-sm);
      padding: .375rem .5rem;
      cursor: pointer;
      color: var(--sand-200);
      flex-direction: column;
      gap: 4px;
      align-items: center;
      justify-content: center;
    }
    #nav-toggle .bar {
      display: block;
      width: 18px;
      height: 1.5px;
      background: currentColor;
      border-radius: 1px;
      transition: transform var(--transition), opacity var(--transition);
    }
    #nav-toggle[aria-expanded="true"] .bar:nth-child(1) { transform: translateY(5.5px) rotate(45deg); }
    #nav-toggle[aria-expanded="true"] .bar:nth-child(2) { opacity: 0; }
    #nav-toggle[aria-expanded="true"] .bar:nth-child(3) { transform: translateY(-5.5px) rotate(-45deg); }
    #nav-toggle:focus-visible { outline: 2px solid var(--sand-400); outline-offset: 2px; }

    /* Mobile nav drawer */
    #mobile-nav {
      display: block;
      position: absolute;
      top: 100%;
      left: 0;
      right: 0;
      background: color-mix(in srgb, var(--header-bg) 97%, transparent);
      backdrop-filter: blur(12px);
      border-bottom: 1px solid rgba(255,255,255,.08);
      padding: .75rem 1.5rem 1rem;
      list-style: none;
      gap: .25rem;
      flex-direction: column;
    }
    #mobile-nav.open  { display: flex; }
    #mobile-nav a {
      display: block;
      font-family: var(--font-body);
      font-size: .9375rem;
      font-weight: 500;
      color: var(--sand-200);
      padding: .5rem .75rem;
      border-radius: var(--radius-sm);
    }
    #mobile-nav a:hover { background: rgba(255,255,255,.07); color: var(--sand-50); }

    /* ═══════════════════════════════════════════════════
       BLOG HERO BANNER (index only)
       ═══════════════════════════════════════════════════ */
    {block:IndexPage}
    #blog-hero {
      position: relative;
      background: linear-gradient(
        135deg,
        var(--sand-950) 0%,
        var(--sand-900) 30%,
        var(--sand-800) 60%,
        var(--sand-950) 100%
      );
      padding: 3rem 1.5rem;
      overflow: hidden;
      text-align: center;
    }
    #blog-hero::before {
      content: '';
      position: absolute;
      inset: 0;
      background: radial-gradient(ellipse 80% 80% at 50% 110%, transparent 40%, rgba(0,0,0,.4) 100%);
      pointer-events: none;
    }
    #blog-hero    .hero-avatar-wrap {
      position: relative;
      display: inline-block;
      margin-bottom: 1rem;
    }
    .hero-avatar {
      width: 5rem;
      height: 5rem;
      border-radius: 50%;
      border: 3px solid var(--sand-400);
      object-fit: cover;
      box-shadow: 0 0 0 6px rgba(200,132,42,.15);
    }
    .hero-title {
      font-family: var(--font-display);
      font-size: clamp(1.75rem, 5vw, 2.5rem);
      font-weight: 600;
      color: var(--sand-50);
      letter-spacing: -.02em;
      line-height: 1.1;
      margin-bottom: .5rem;
    }
    .hero-title em {
      font-style: italic;
      color: var(--sand-400);
    }
    .hero-desc {
      font-family: var(--font-body);
      font-size: .9375rem;
      color: var(--sand-200);
      max-width: 48ch;
      margin: 0 auto;
      line-height: 1.6;
      opacity: .9;
    }
    {/block:IndexPage}

    /* ═══════════════════════════════════════════════════
       SITE LAYOUT
       ═══════════════════════════════════════════════════ */
    #site-wrapper {
      max-width: var(--site-max);
      margin: 0 auto;
      padding: 2.5rem 1.5rem;
      display: grid;
      grid-template-columns: var(--sidebar-width) 1fr;
      grid-template-rows: auto;
      gap: 2.5rem;
      align-items: start;
    }

    {block:ifShowSidebar}
    /* sidebar is grid column 2 */
    #site-sidebar {
      display: block;
    }
    {/block:ifShowSidebar}

    {block:ifnotShowSidebar}
    #site-wrapper {
      grid-template-columns: 1fr;
      max-width: var(--content-max);
    }
    #site-sidebar {
      display: none;
    }
    {/block:ifnotShowSidebar}

    /* Wide posts option */
    {block:ifWidePosts}
    #site-wrapper { max-width: 100%; }
    #main-content  { max-width: 760px; }
    {/block:ifWidePosts}

    /* ─── MAIN COLUMN ────────────────────────────────── */
    #main-content { min-width: 0; }

    /* ═══════════════════════════════════════════════════
       POST CARD BASE
       ═══════════════════════════════════════════════════ */
    .post {
      background: var(--post-bg);
      border: 1px solid var(--border);
      border-radius: var(--radius-lg);
      box-shadow: var(--shadow-sm);
      margin-bottom: 1.75rem;
      overflow: hidden;
      transition: box-shadow var(--transition), border-color var(--transition);
    }
    .post:hover { box-shadow: var(--shadow-md); }

    .post-inner { padding: 1.5rem 1.75rem; }

    /* ─── POST TYPE BADGE ────────────────────────────── */
    {block:ifShowPostTypeIcons}
    .post-type-badge {
      display: inline-flex;
      align-items: center;
      gap: .35rem;
      font-family: var(--font-body);
      font-size: .6875rem;
      font-weight: 500;
      letter-spacing: .06em;
      text-transform: uppercase;
      color: var(--sand-600);
      background: var(--sand-100);
      border: 1px solid var(--sand-200);
      border-radius: var(--radius);
      padding: .2rem .55rem;
      margin-bottom: .875rem;
    }
    {block:ifDarkMode}
    .post-type-badge {
      color: var(--sand-300);
      background: rgba(255,255,255,.06);
      border-color: rgba(255,255,255,.1);
    }
    {/block:ifDarkMode}
    .post-type-badge svg { width: .75rem; height: .75rem; flex-shrink: 0; }
    {/block:ifShowPostTypeIcons}

    /* ─── POST TITLE ─────────────────────────────────── */
    .post-title {
      font-family: var(--font-display);
      font-size: 1.5rem;
      font-weight: 600;
      color: var(--heading);
      line-height: 1.25;
      margin-bottom: .75rem;
    }
    .post-title a { color: inherit; }
    .post-title a:hover { color: var(--accent); }

    /* ─── POST BODY ──────────────────────────────────── */
    .post-body {
      font-family: var(--font-body);
      font-size: 1.125rem;
      line-height: 1.9;
      color: var(--text);
    }
    .post-text .post-body { max-width: 60ch; }
    .post-body p           { margin-bottom: 1em; }
    .post-body p:last-child { margin-bottom: 0; }
    .post-body h2 { font-family: var(--font-display); font-size: 1.25rem; font-weight: 600; margin: 1.25em 0 .5em; color: var(--heading); }
    .post-body h3 { font-family: var(--font-display); font-size: 1.1rem;  font-weight: 600; margin: 1em 0 .4em; color: var(--heading); }
    .post-body a  { color: var(--accent); text-decoration: underline; text-underline-offset: 2px; }
    .post-body a:hover { color: var(--highlight); }
    .post-body strong { font-weight: 600; }
    .post-body em     { font-style: italic; }
    .post-body ul, .post-body ol { margin: .75em 0 .75em 1.5em; }
    .post-body li { margin-bottom: .25em; }
    .post-body blockquote {
      border-left: 3px solid var(--sand-300);
      padding: .5rem 0 .5rem 1rem;
      margin: 1em 0;
      color: var(--sand-600);
      font-style: italic;
    }
    {block:ifDarkMode}
    .post-body blockquote { border-color: var(--sand-700); color: var(--sand-300); }
    {/block:ifDarkMode}
    .post-body hr {
      border: none;
      border-top: 1px solid var(--border);
      margin: 1.5em 0;
    }
    .post-body pre {
      background: var(--sand-100);
      border: 1px solid var(--border);
      border-radius: var(--radius-sm);
      padding: 1rem;
      overflow-x: auto;
      font-size: .875rem;
    }
    {block:ifDarkMode}
    .post-body pre { background: rgba(0,0,0,.3); border-color: var(--border); }
    {/block:ifDarkMode}
    .post-body code {
      font-size: .875em;
      background: var(--sand-100);
      border-radius: 3px;
      padding: .1em .3em;
    }
    {block:ifDarkMode}
    .post-body code { background: rgba(0,0,0,.3); }
    {/block:ifDarkMode}

    /* Drop cap on first text post paragraph */
    .post-text .post-body > p:first-of-type::first-letter {
      font-family: var(--font-display);
      font-size: 4.5rem;
      font-weight: 600;
      float: left;
      line-height: .8;
      margin: .05em .12em -.05em 0;
      color: var(--drop-cap);
    }

    /* ─── ORNAMENT DIVIDER ───────────────────────────── */
    .ornament {
      display: flex;
      align-items: center;
      gap: .75rem;
      margin: 1rem 0;
      color: var(--sand-400);
    }
    .ornament::before, .ornament::after {
      content: '';
      flex: 1;
      height: 1px;
      background: var(--border);
    }
    .ornament-icon {
      font-size: .875rem;
      opacity: .7;
    }

    /* ═══════════════════════════════════════════════════
       TEXT POST
       ═══════════════════════════════════════════════════ */
    /* base styles already handle this */

    /* ═══════════════════════════════════════════════════
       PHOTO POST
       ═══════════════════════════════════════════════════ */
    .post-photo .photo-wrap {
      position: relative;
      overflow: hidden;
    }
    @keyframes kenBurns {
      from { transform: scale(1); }
      to   { transform: scale(1.05); }
    }
    @keyframes scrollPulse {
      0%, 100% { opacity: 0.5; transform: translateY(0) translateX(-50%); }
      50%       { opacity: 1;   transform: translateY(5px) translateX(-50%); }
    }
    .scroll-cue {
      animation: scrollPulse 2.5s ease-in-out infinite;
    }

    .post-photo .photo-img {
      width: 100%;
      object-fit: cover;
      animation: kenBurns 20s ease-in-out infinite alternate;
      display: block;
    }
    .post-photo .photo-wrap::after {
      content: '';
      position: absolute;
      bottom: 0;
      left: 0;
      right: 0;
      height: 45%;
      background: linear-gradient(to top, rgba(74,44,16,.5), transparent);
      pointer-events: none;
    }
    .post-photo .post-inner { padding-top: 1rem; }

    /* ─── PHOTOSET ───────────────────────────────────── */
    .photoset-grid {
      display: grid;
      gap: 3px;
    }
    .photoset-grid.cols-2 { grid-template-columns: repeat(2, 1fr); }
    .photoset-grid.cols-3 { grid-template-columns: repeat(3, 1fr); }
    .photoset-grid img    { width: 100%; height: 220px; object-fit: cover; display: block; }

    /* ═══════════════════════════════════════════════════
       QUOTE POST
       ═══════════════════════════════════════════════════ */
    .post-quote .post-inner { padding: 2rem 2rem; }
    .quote-mark {
      font-family: var(--font-display);
      font-size: 5rem;
      font-weight: 700;
      line-height: .5;
      color: var(--accent);
      opacity: .35;
      margin-bottom: .5rem;
      display: block;
    }
    .quote-text {
      font-family: var(--font-display);
      font-size: 1.4rem;
      font-style: italic;
      font-weight: 400;
      line-height: 1.5;
      color: var(--text);
      margin-bottom: 1rem;
    }
    .quote-source {
      font-family: var(--font-body);
      font-size: .875rem;
      color: var(--sand-500);
      display: flex;
      align-items: center;
      gap: .5rem;
    }
  </style>
</head>
